<svg width="100%" viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="arch-title arch-desc">
  <title id="arch-title">Meridian HR Copilot — Architecture</title>
  <desc id="arch-desc">Five-layer architecture: corpus, ingestion pipeline, data and governance layer with Postgres RLS, retrieval API, and three-tab UI.</desc>

  <defs>
    <marker id="arrow-mute" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#475569" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-accent" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#10B981" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .layer-label { fill: #10B981; font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Inter, sans-serif; font-size: 12px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; }
      .box-title   { fill: #F8FAFC; font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Inter, sans-serif; font-size: 14px; font-weight: 600; }
      .box-sub     { fill: #94A3B8; font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Inter, sans-serif; font-size: 11.5px; }
      .layer-bg    { fill: #0F172A; stroke: #1E293B; stroke-width: 1; }
      .box         { fill: #0F1B2D; stroke: #1F2A3D; stroke-width: 1; }
      .box-accent  { fill: #0F1B2D; stroke: #10B981; stroke-width: 1.25; }
    </style>
  </defs>

  <!-- LAYER 1: CORPUS -->
  <text class="layer-label" x="40" y="28">1 · Corpus</text>
  <rect class="layer-bg" x="40" y="38" width="1120" height="56" rx="10"/>
  <text class="box-title" x="60" y="62">15 markdown documents with YAML frontmatter</text>
  <text class="box-sub"   x="60" y="80">Policies · SOPs · FAQs · guides — versioned, role-tagged, region-tagged</text>

  <line x1="600" y1="94" x2="600" y2="116" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow-mute)"/>

  <!-- LAYER 2: INGESTION PIPELINE -->
  <text class="layer-label" x="40" y="135">2 · Ingestion pipeline</text>
  <rect class="box" x="40"   y="146" width="265" height="62" rx="10"/>
  <text class="box-title" x="172.5" y="173" text-anchor="middle">Semantic chunker</text>
  <text class="box-sub"   x="172.5" y="192" text-anchor="middle">Split by heading · merge under 100 tok</text>

  <rect class="box" x="325"  y="146" width="265" height="62" rx="10"/>
  <text class="box-title" x="457.5" y="173" text-anchor="middle">Embedder</text>
  <text class="box-sub"   x="457.5" y="192" text-anchor="middle">OpenAI text-embedding-3-small · 1536 dim</text>

  <rect class="box" x="610"  y="146" width="265" height="62" rx="10"/>
  <text class="box-title" x="742.5" y="173" text-anchor="middle">Metadata tagger</text>
  <text class="box-sub"   x="742.5" y="192" text-anchor="middle">Persona · region · version · deprecation</text>

  <rect class="box" x="895"  y="146" width="265" height="62" rx="10"/>
  <text class="box-title" x="1027.5" y="173" text-anchor="middle">Indexer</text>
  <text class="box-sub"   x="1027.5" y="192" text-anchor="middle">Upsert into pgvector · IVFFlat</text>

  <line x1="172.5"  y1="208" x2="172.5"  y2="232" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow-mute)"/>
  <line x1="457.5"  y1="208" x2="457.5"  y2="232" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow-mute)"/>
  <line x1="742.5"  y1="208" x2="742.5"  y2="232" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow-mute)"/>
  <line x1="1027.5" y1="208" x2="1027.5" y2="232" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow-mute)"/>

  <!-- LAYER 3: DATA + GOVERNANCE (HIGHLIGHTED) -->
  <text class="layer-label" x="40" y="251">3 · Data + governance · Supabase + pgvector</text>
  <rect class="box-accent" x="40" y="262" width="1120" height="116" rx="10"/>
  <text class="box-sub" x="60" y="284">Postgres Row-Level Security enforces RBAC at the data layer · same query, different personas, different result sets</text>

  <rect class="box" x="60"  y="298" width="255" height="64" rx="8"/>
  <text class="box-title" x="187.5" y="324" text-anchor="middle">mhr_chunks</text>
  <text class="box-sub"   x="187.5" y="345" text-anchor="middle">vectors + denormalized metadata</text>

  <rect class="box" x="335" y="298" width="255" height="64" rx="8"/>
  <text class="box-title" x="462.5" y="324" text-anchor="middle">mhr_documents</text>
  <text class="box-sub"   x="462.5" y="345" text-anchor="middle">version lineage · deprecation</text>

  <rect class="box" x="610" y="298" width="255" height="64" rx="8"/>
  <text class="box-title" x="737.5" y="324" text-anchor="middle">mhr_audit_log</text>
  <text class="box-sub"   x="737.5" y="345" text-anchor="middle">retrieved · filtered-out · why</text>

  <rect class="box" x="885" y="298" width="255" height="64" rx="8"/>
  <text class="box-title" x="1012.5" y="324" text-anchor="middle">mhr_eval_runs</text>
  <text class="box-sub"   x="1012.5" y="345" text-anchor="middle">precision · recall · faithfulness</text>

  <line x1="187.5" y1="378" x2="187.5" y2="416" stroke="#10B981" stroke-width="1.5" marker-end="url(#arrow-accent)"/>
  <line x1="737.5" y1="378" x2="737.5" y2="416" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow-mute)"/>
  <line x1="1012.5" y1="378" x2="1012.5" y2="416" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow-mute)"/>

  <!-- LAYER 4: RETRIEVAL API -->
  <text class="layer-label" x="40" y="436">4 · Retrieval API</text>
  <rect class="box-accent" x="40" y="447" width="555" height="62" rx="10"/>
  <text class="box-title" x="317.5" y="473" text-anchor="middle">/api/chat</text>
  <text class="box-sub"   x="317.5" y="493" text-anchor="middle">embed → RLS search → PII redact → generate → faithfulness → audit</text>

  <rect class="box" x="615" y="447" width="265" height="62" rx="10"/>
  <text class="box-title" x="747.5" y="473" text-anchor="middle">/api/audit</text>
  <text class="box-sub"   x="747.5" y="493" text-anchor="middle">live retrieval feed</text>

  <rect class="box" x="895" y="447" width="265" height="62" rx="10"/>
  <text class="box-title" x="1027.5" y="473" text-anchor="middle">/api/evals · /api/content</text>
  <text class="box-sub"   x="1027.5" y="493" text-anchor="middle">read-only views</text>

  <line x1="317.5"  y1="509" x2="317.5"  y2="533" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow-mute)"/>
  <line x1="747.5"  y1="509" x2="747.5"  y2="533" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow-mute)"/>
  <line x1="1027.5" y1="509" x2="1027.5" y2="533" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow-mute)"/>

  <!-- LAYER 5: UI -->
  <text class="layer-label" x="40" y="552">5 · UI · Next.js App Router</text>
  <rect class="box" x="40"  y="563" width="370" height="36" rx="8"/>
  <text class="box-title" x="225"  y="586" text-anchor="middle">/copilot — employee chat + persona</text>

  <rect class="box" x="425" y="563" width="370" height="36" rx="8"/>
  <text class="box-title" x="610"  y="586" text-anchor="middle">/governance — content + audit inspector</text>

  <rect class="box" x="810" y="563" width="350" height="36" rx="8"/>
  <text class="box-title" x="985"  y="586" text-anchor="middle">/evals — quality dashboard</text>
</svg>
